services:
  db:
    image: postgres:16-alpine
    container_name: sinistros_postgres
    restart: always
    environment:
      POSTGRES_DB: sinistros_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sinistros_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sinistros_api
    restart: always
    ports:
      - "5113:5113"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=sinistros_db;Username=postgres;Password=postgres
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: sinistros_web
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres_data:
